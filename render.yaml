services:
  # 1. Backend Web Service (Express API + Telegram Bot)
  - type: web
    name: paisatap-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install --include=dev && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
        description: "Your MongoDB connection string (e.g. MongoDB Atlas link)"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
        description: "Your Telegram Bot Token from BotFather"
      - key: BOT_USERNAME
        sync: false
        description: "Your Telegram Bot Username (without the @ symbol)"
      - key: WEBAPP_URL
        sync: false
        description: "The live URL of your deployed Frontend Static Site (needed for Bot inline buttons)"
      - key: ADMIN_PASSWORD
        value: PaisaTapAdmin123
        description: "The administrator password for the PaisaTap Admin Panel"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        value: paisatap_secret

  # 2. Frontend Static Site
  - type: web
    name: paisatap-frontend
    runtime: static
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: paisatap-backend
          property: host
